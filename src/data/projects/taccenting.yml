      # Hold
      So I focused on the ergonomic part, and tried holding a key for accent. Hold for one interval to get an accent. Two intervals re-print the character as a second accent variation.
      Unsurprisingly, the interval time amount is not just hard to get right, it's impossible. The hold interval should at the same time be as short as possible, to not waste your time while typing, but also be as long as possible, so you have a large time window in which to select the accent variant you want, and release the key to print it. It's a push-pull contradiction that's impossible to resolve.
  - type: image
    data: hold.png

  - type: text
    data: |-
      # Quick accent
      This method is pretty good. While holding a letter, press the activation key. Press it again for the next accent variant.
  - type: image
