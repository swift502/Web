      My personal gripe is time and rollolver
      # Autocorrect
      Autocorrect certainly deserves an honorable mention, because it does exist, is ubiquitous on mobile, and largely seems to serve it's purpose.
      The issue with autocorrect is that it always relies on prediction, and as such can't allow you to do unpredictable things. That's acceptable on phones, but we're specifically interested in generic keyboard input methodology that could theoretically be implemented on any OS, for any keyboard, and used in any way. Autocorrect is not that. It is highly dependent on implementation details and input modality.
      Bottom line is, autocorrect exists on PC in multiple forms, and can probably be used to input accents. But it's a far more abstract and fuzzy system than what I'd personally be comfortable with. The only autocorrect system I can imagine would fulfill my strict criteria of determinism and infallability is one which would read your mind, so it would always correct to the specific string of symbols you meant to type. At which point, we could probably get rid of typing altogether and solely use mindreading to type.

