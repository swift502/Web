  - type: text
    data: |-
      This method is a good starting point. The conflict of `ě` vs `é` can be resolved by different composition combos. In the example above, `RAlt+e` prints `ě`, while `RAlt+e+e` prints the less common `é`.
      What I didn't like about this approach is that it requires planning ahead. In handwriting, accents are always written _after_ the letter itself. And while it's likely possible to rewire the brain to think if the letter ahead needs an accent, it by no means feels intuitive. Which is why I experimented with post-modding.

      # Post-mod
      By this I mean pressing a modifier key _after_ the letter to retroactively add an accent. Second accent variants are then done using multiple taps of the modifier key. E.g. `e+RAlt+RAlt` prints the second accent variant of `e`.
