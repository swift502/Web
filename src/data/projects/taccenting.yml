      # Tap-accenting (Taccenting)
      Coming from Hold, if only there was a way to let the user determine the tap interval interactively. Be as fast, or slow as you want, and the system would follow along. What if...
  - type: image
    data: tap.png
  - type: text
    data: |-
      Tapping for accents is the only system I've tried, which:
      - Doesn't require planning ahead
      - Is not time sensitive
      - Is equally ergonomic on every keyboard

      Negatives:
      -
      -
      -

      And so the question you might ask: have we really resolved anything? If we still have to switch to this tapping mode, what's the difference between that and just switching to a Czech keyboard layout:
      - The layout doesn't change, we only toggle the ability to type accents
      - you still type all symbols like ;, ! and # in the same way, and alongside accents, while that's impossible on Czech layouts
      - Capitalization using shift works with Taccenting. Shifting accented letters doesn't work in any of the three Czech layouts and requires a Caps lock.
